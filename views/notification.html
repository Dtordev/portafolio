<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Nuevo mensaje</title>
</head>

<body style="margin:0; padding:0; background-color:#f2f4f8; font-family: Lucida Sans Unicode, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f2f4f8; padding:20px 0;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0"
                    style="background:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #153a80;">
                    <tr>
                        <td
                            style="background:linear-gradient(to right, #19222c, #153a80); padding:20px; text-align:center;">
                            <a href="https://dtordev.github.io/portafolio/" target="_blank">
                                <img src="https://dtordev.github.io/portafolio/assets/images/logo.png" alt="Logo"
                                    style="max-width:200px;">
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:25px 30px 10px 30px;">
                            <p style="margin:0; font-size:18px; font-weight:bold; color:#333;">
                                Has recibido un nuevo mensaje
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:10px 30px 20px 30px;">
                            <p style="margin:0; font-size:14px; color:#555; line-height:22px;">
                                Una persona te ha contactado a través de tu sitio web:
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 30px;">
                            <table width="100%" cellpadding="0" cellspacing="0"
                                style="background:#f9f9fb; border-radius:6px; padding:15px;">
                                <tr>
                                    <td style="font-size:14px; color:#333; line-height:22px;">
                                        <strong>Nombre:</strong> {{name}}<br>
                                        <strong>Email:</strong> <a href="mailto:{{mail}}"
                                            target="_blank">{{mail}}</a><br>
                                        <strong>Asunto:</strong> {{subject}}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 30px;">
                            <table width="100%" cellpadding="0" cellspacing="0"
                                style="border-left:4px solid #1aa1fe; background:#f5f7ff;">
                                <tr>
                                    <td style="padding:15px; font-size:14px; color:#333; line-height:22px;">
                                        {{message}}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 30px; border-top:1px solid #e0e0e0;">
                            <p style="margin:0; font-size:12px; color:#888; line-height:18px;">
                                <strong>Dtor.dev © 2026</strong><br>
                                Bogotá, Colombia
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
